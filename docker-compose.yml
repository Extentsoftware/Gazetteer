services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: gazetteer
      POSTGRES_USER: gazetteer
      POSTGRES_PASSWORD: gazetteer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=gazetteer;Username=gazetteer;Password=gazetteer
      - Elasticsearch__Uri=http://elasticsearch:9200
    depends_on:
      - postgres
      - elasticsearch

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5001:8080"
    environment:
      - ApiBaseUrl=http://api:8080
    depends_on:
      - api

volumes:
  postgres_data:
  es_data:
